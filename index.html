<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Launch</title>
</head>

<body>

<!-- iPhone用 -->
<a id="ios-ar-link" rel="ar" href="./models/neko_0612.usdz">
  <img src="https://dummyimage.com/300x300/000/fff&text=AR" width="300" alt="AR">
</a>

<script>
window.onload = function() {

  const ua = navigator.userAgent.toLowerCase();

  const isIOS = /iphone|ipad|ipod/.test(ua);
  const isAndroid = /android/.test(ua);

  if (isIOS) {

    // iPhone → Quick Look
    document.getElementById("ios-ar-link").click();

  } else if (isAndroid) {

    // Android → Scene Viewer

    const glbUrl =
      "https://skymchhr.github.io/ar-test-0508/models/neko_0612.glb";

    const sceneViewerUrl =
      "intent://arvr.google.com/scene-viewer/1.0?file=" +
      encodeURIComponent(glbUrl) +
      "&mode=ar_preferred#Intent;scheme=https;package=com.google.android.googlequicksearchbox;end;";

    window.location.href = sceneViewerUrl;

  } else {

    document.body.innerHTML =
      "<p>スマートフォンで開いてください。</p>";

  }

}
</script>

</body>
</html>
